<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Blood, Sweat & Play</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">

  <h1>🩸 Blood, Sweat & Play 🍻</h1>

  <input
    id="playerName"
    type="text"
    placeholder="Tu nombre"
  >

  <br><br>

  <button onclick="createRoom()">
    Crear sala
  </button>

  <hr>

  <input
    id="roomCode"
    type="text"
    placeholder="Código"
  >

  <button onclick="joinRoom()">
    Unirse
  </button>

</div>

<div id="lobby" style="display:none;">

  <h2>Sala: <span id="roomName"></span></h2>

  <p id="playerList"></p>

  <button id="startButton" onclick="startGame()">
    🚀 Empezar partida
  </button>

</div>

<div id="game" style="display:none;">

  <h2 id="turnText"></h2>

  <button onclick="rollDice()">
    🎲 Tirar dado
  </button>

  <p id="diceResult"></p>

  <div id="board"></div>

</div>


  <script src="script.js"></script>

</body>
</html>
