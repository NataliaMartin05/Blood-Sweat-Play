<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Blood, Sweat & Play</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu"> <!-- Se crea el menú principal --> 

  <h1>🩸 Blood, Sweat & Play 🍻</h1>  <!-- Título --> 
   <!-- Campos a rellenar --> 
  <input
    id="playerName"
    type="text"
    placeholder="Tu nombre"
  >

  <br><br>
   <!-- Botón crear sala --> 
  <button onclick="createRoom()">
    Crear sala
  </button>

  <hr>
   <!-- Campos a rellenar --> 
  <input
    id="roomCode"
    type="text"
    placeholder="Código"
  >
   <!-- Botón unirse a sala --> 
  <button onclick="joinRoom()">
    Unirse
  </button>

</div>
 <!-- Se crea el lobby --> 
<div id="lobby" style="display:none;">

  <h2>Sala: <span id="roomName"></span></h2>

  <h3>Elige tu ficha</h3>

  <div id="tokenSelector"></div>

  <p>
  Ficha elegida:
  <span id="chosenToken">Ninguna</span>
  </p>
  
  <p id="playerList"></p>

   <!-- Botón start --> 
  <button id="startButton" onclick="startGame()">
    🚀 Empezar partida
  </button>

</div>

<div id="game" style="display:none;">

  <h2 id="turnText"></h2>
  <!-- Botón dado -->
  <button onclick="rollDice()">
    🎲 Tirar dado
  </button>

  <p id="diceResult"></p>

  <div id="board"></div>

</div>

  <!-- Popup retos -->
  <div id="challengePopup" style="display:none;">

  <div id="challengeContent">

    <h1>🎯 RETO</h1>

    <p id="challengeText"></p>

    <button onclick="closeChallenge(true)">
      ✅ Hecho
    </button>

    <button onclick="closeChallenge(false)">
      ❌ No hecho
    </button>

  </div>

</div>
   <!-- Fin del juego --> 
  <div id="victoryPopup" style="display:none;">

  <div id="victoryContent">

    <h1>🏆 VICTORIA 🏆</h1>

    <h2 id="winnerText"></h2>

    <button onclick="location.reload()">
      Nueva partida
    </button>

  </div>

</div>
  <!-- Añadimos confeti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
